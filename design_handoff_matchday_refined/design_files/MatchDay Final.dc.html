<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<div style="min-height:100vh; background:radial-gradient(900px 500px at 80% -5%, rgba(31,193,107,0.08), transparent 60%), #07080c; font-family:'Hanken Grotesk',system-ui,sans-serif; padding:52px 48px 80px; color:#f3f5f9;">
  <div style="max-width:1320px; margin:0 auto;">

    <div style="display:flex; align-items:center; gap:14px; margin-bottom:8px;">
      <div style="width:40px; height:40px; border-radius:12px; background:linear-gradient(145deg,#1aa85e,#0f7a48); display:grid; place-items:center; box-shadow:0 6px 20px -6px rgba(15,122,72,0.7);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#eafff3" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
      </div>
      <div style="font-size:12.5px; letter-spacing:0.16em; text-transform:uppercase; color:#69707e; font-weight:600;">MatchDay · Refined · Final</div>
    </div>
    <h1 style="margin:0 0 6px; font-size:34px; font-weight:700; letter-spacing:-0.025em; font-family:'Schibsted Grotesk',system-ui,sans-serif;">Web app &amp; PWA, one system</h1>
    <p style="margin:0 0 40px; max-width:620px; font-size:15px; line-height:1.55; color:#9aa3b2;">Schibsted Grotesk numerals, Hanken Grotesk body, a refined emerald with a colourful feature-card hero, and sky / amber / coral used only to carry meaning. Same language across desktop and phone.</p>

    <!-- showcase stage -->
    <div style="position:relative; padding-bottom:40px;">

      <!-- desktop in browser frame -->
      <div style="width:884px; border-radius:14px; overflow:hidden; box-shadow:0 40px 90px -30px rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.08);">
        <!-- browser chrome -->
        <div style="height:38px; background:#15171d; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:14px; padding:0 14px;">
          <div style="display:flex; gap:7px;">
            <div style="width:11px; height:11px; border-radius:50%; background:#ff5f57;"></div>
            <div style="width:11px; height:11px; border-radius:50%; background:#febc2e;"></div>
            <div style="width:11px; height:11px; border-radius:50%; background:#28c840;"></div>
          </div>
          <div style="flex:1; max-width:420px; height:23px; border-radius:7px; background:#0e1014; display:flex; align-items:center; gap:7px; padding:0 11px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#69707e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <span style="font-size:11.5px; color:#9aa3b2; font-weight:500;">app.matchday.co</span>
          </div>
        </div>
        <!-- scaled desktop -->
        <div style="width:884px; height:552px; overflow:hidden; position:relative;">
          <div style="position:absolute; top:0; left:0; width:1440px; height:900px; transform:scale(0.6139); transform-origin:top left;">
            <dc-import name="MatchDay Web" hint-size="1440px,900px"></dc-import>
          </div>
        </div>
      </div>

      <!-- phone overlapping bottom-right -->
      <div style="position:absolute; right:-6px; bottom:0; filter:drop-shadow(0 30px 60px rgba(0,0,0,0.7));">
        <dc-import name="RefinedScreen" screen="dashboard" rf="dark" hint-size="312px,648px"></dc-import>
      </div>

    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:820}}"></script>
</body>
</html>
