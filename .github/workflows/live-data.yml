name: Live data sync

# Pings the deployed cron endpoints on a schedule. NOTHING is committed — these
# are just authenticated HTTP calls; the data lands in Supabase. Requires two
# repo secrets: APP_URL (e.g. https://matchday.app) and CRON_SECRET (same value
# as the app's CRON_SECRET env var).
on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (GitHub may delay during peak load)
    - cron: '7 */6 * * *'    # injury feed is slow-moving; refresh four times daily
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch lineups for imminent matches
        run: |
          curl --fail-with-body --retry 2 --max-time 25 -sS -X GET "$APP_URL/api/fetch-lineup" \
            -H "Authorization: Bearer $CRON_SECRET"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Sync finished results + first scorer
        run: |
          curl --fail-with-body --retry 2 --max-time 45 -sS -X GET "$APP_URL/api/sync-results" \
            -H "Authorization: Bearer $CRON_SECRET"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Send prediction reminders for imminent matches
        run: |
          curl --fail-with-body --retry 2 --max-time 30 -sS -X GET "$APP_URL/api/cron/kickoff-reminders" \
            -H "Authorization: Bearer $CRON_SECRET"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  injuries:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '7 */6 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Refresh injuries
        run: |
          curl --fail-with-body --retry 2 --max-time 45 -sS -X GET "$APP_URL/api/sync-injuries" \
            -H "Authorization: Bearer $CRON_SECRET"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  # Diagnostic (manual runs only): can the runner reach Kickoffapi directly?
  # No API key needed — Cloudflare's challenge happens at the edge before the
  # API checks the key. JSON 401 = reachable; "Just a moment" = blocked.
  diagnose-egress:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: GitHub runner -> Kickoffapi
        run: |
          code=$(curl -s -o /tmp/ko.html -w "%{http_code}" "https://api.kickoffapi.com/api/v1/status")
          echo "HTTP status: $code"
          echo "--- first 200 bytes ---"; head -c 200 /tmp/ko.html; echo
          if grep -qi "just a moment" /tmp/ko.html; then
            echo "RESULT: BLOCKED — Cloudflare challenges this runner too (datacenter IPs blocked across the board)"
          else
            echo "RESULT: REACHABLE — GitHub Actions can call Kickoffapi; automation via GH Actions -> Supabase is viable"
          fi
