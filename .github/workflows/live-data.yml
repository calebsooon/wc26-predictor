name: Tournament reminders

# Manual trigger for the reminder endpoint. Requires two repo secrets:
#   APP_URL    — your deployed URL (e.g. https://matchday.app)
#   CRON_SECRET — matches the app's CRON_SECRET env var
#
# FIFA match data is intentionally refreshed from a trusted local machine with
# `npm run data:fifa:daily`; this workflow must not mix in legacy provider data.
on:
  workflow_dispatch: {}

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send prediction reminders for imminent matches
        continue-on-error: true
        run: |
          curl --fail-with-body --retry 2 --max-time 30 -sS -X GET "$APP_URL/api/cron/kickoff-reminders" \
            -H "Authorization: Bearer $CRON_SECRET"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
